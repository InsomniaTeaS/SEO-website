        <ul>

    <main>
        <h2> (SEO) Form Page </h2>
        <form method="post" action="https://webdevbasics.net/scripts/demo.php">

            <label for="name">Name:</label>
            <input type="text" id="username" name="username" required>
            <br><br>

            <label for="country">Country:</label>
            <select id="country" name="country">
                <option value="USA">United States</option>
                <option value="CA">Canada</option>
                <option value="CN">China</option>
                <option value="JP">Japan</option>
                <option value="KR">South Korea</option>
            </select>
            <br><br>

            <label for="startdate">Start Date:</label>
            <input type="date" id="startdate" name="startdate" required>
            <br><br>

            <div class="container">
                <p>Gender:</p>
                <input type="radio" id="male" name="gender" value="male">
                <label for="male">Male</label>
                <br>
                <input type="radio" id="female" name="gender" value="female">
                <label for="female">Female</label>
                <br>
                <input type="radio" id="other" name="gender" value="other">
                <label for="other">Other</label>
            </div>
            <br><br>

            <div class="container">
                <p>Hobbies:</p>
                <input type="checkbox" id="reading" name="hobby" value="reading">
                <label for="reading">Reading</label>
                <br>
                <input type="checkbox" id="gaming" name="hobby" value="gaming">
                <label for="gaming">Gaming</label>
                <br>
                <input type="checkbox" id="traveling" name="hobby" value="traveling">
                <label for="traveling">Traveling</label>
                <br>
                <input type="checkbox" id="sleeping" name="hobby" value="sleeping">
                <label for="sleeping">Sleeping</label>
            </div>
            <br><br>

            <label for="comments">Comments:</label><br>
            <textarea id="comments" name="comments" rows="4" cols="40"></textarea>
            <br><br>

            <input type="submit" value="Submit">
            <input type="reset" value="Reset">

        </form>

    </main>

    <footer>
        <p>Final Project</p>

    </footer>
